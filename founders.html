<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Founder Shoutouts</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }

    header {
      background: #1f1f1f;
      padding: 30px;
      text-align: center;
      border-bottom: 2px solid #444;
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
      color: #00ffcc;
    }

    header p {
      margin-top: 10px;
      color: #ccc;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.05);
      border-color: #00ffcc;
    }

    .card h2 {
      margin: 10px 0 5px;
      color: #00ffcc;
    }

    .card p {
      font-size: 0.9rem;
      color: #bbb;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1f1f1f;
      border-top: 2px solid #444;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    <h1>Founder Shoutouts</h1>
    <p>Honoring the people who built the foundation of our community</p>
  </header>

  <div class="container">

    <div class="card">
      <h2>Founder 1</h2>
      <p>Visionary & Community Builder</p>
    </div>

    <div class="card">
      <h2>Founder 2</h2>
      <p>Creative Director & Strategy Lead</p>
    </div>

    <div class="card">
      <h2>Founder 3</h2>
      <p>Tech Lead & Systems Architect</p>
    </div>

    <div class="card">
      <h2>Founder 4</h2>
      <p>Community Manager & Support Lead</p>
    </div>

  </div>

  <footer>
    <p>Made with respect for the founders 💙</p>
  </footer>

</body>
</html>
