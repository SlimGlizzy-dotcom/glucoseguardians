<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Links</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #1f2937;
            padding: 40px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .link-button {
            display: block;
            text-decoration: none;
            color: white;
            padding: 15px;
            margin: 12px 0;
            border-radius: 10px;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .youtube {
            background: #ff0000;
        }

        .discord {
            background: #5865F2;
        }

        .tiktok {
            background: #000000;
            border: 1px solid #25F4EE;
        }

        .twitch {
            background: #9146FF;
        }

        .kick {
            background: #53FC18;
            color: black;
            font-weight: bold;
        }

        .link-button:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔥 Follow Our Community 🔥</h1>

        <a class="link-button youtube"
           href="https://www.youtube.com/@GlucoseGuardians-116"
           target="_blank">
           YouTube
        </a>

        <a class="link-button discord"
           href="https://discord.gg/66FYNRU5b"
           target="_blank">
           Discord
        </a>

     

        <footer>
            © 2026 Your Community
        </footer>
    </div>

</body>
</html>
